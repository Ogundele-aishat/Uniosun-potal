<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    
    <!-- EmailJS SDK Engine Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        (function() {
            // Initializes EmailJS immediately so it is globally available
            if (typeof emailjs !== 'undefined') {
                emailjs.init({
                    publicKey: "YOUR_PUBLIC_KEY_HERE", // ⚠️ Replace with your actual Public Key
                });
            }
        })();
    </script>
</head>
<body>

    <div class="form-container">
        <h2>Send a Message</h2>
        <form id="contact-form">
            <div class="input-group">
                <label for="user_name">Name</label>
                <input type="text" id="user_name" name="user_name" required>
            </div>
            
            <div class="input-group">
                <label for="user_email">Email</label>
                <input type="email" id="user_email" name="user_email" required>
            </div>
            
            <div class="input-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            
            <button type="submit" id="submit-btn">Send Message</button>
        </form>
    </div>

    <!-- Your Custom App Script (Must load at the very bottom) -->
    <script src="app.js"></script>
</body>
</html>
